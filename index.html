          <img class="stage-image incoming" data-role="incoming-image" alt="">

        <button class="ano-caption quiet-link fade-target" type="button" data-action="show-exhibition" data-role="ano-caption">

          <span class="caption-subtitle" data-bind="anoSubtitle"></span>
        </button>
      </main>
